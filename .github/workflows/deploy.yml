name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch docs from source repo
        run: |
          set -e
          mkdir -p app/v1/content/docs
          docs="GET_STARTED.md CONFIG.md PROVIDERS.md AGENTS.md SKILLS.md MEMORY.md GOVERNANCE.md SECURITY.md MULTI-USERS.md SPEC.md"
          for file in $docs; do
            echo "Fetching $file..."
            curl -fsSL --retry 3 --retry-delay 2 \
              "https://raw.githubusercontent.com/ClawixAI/clawix/main/docs/$file" \
              -o "app/v1/content/docs/$file"
          done
          echo "All docs fetched successfully"
          ls -la app/v1/content/docs/

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
